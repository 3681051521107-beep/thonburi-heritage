<!DOCTYPE html>
<html class="light" lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Thonburi Heritage - เส้นทางท่องเที่ยว (Leaflet Edition)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C5A059",
                        "gold": "#d4af37",
                        "wood": "#5d4037",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Noto Sans Thai", "Public Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', 'Public Sans', sans-serif; }
        #map-canvas { height: 100%; width: 100%; z-index: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
        .route-line { position: absolute; left: 19px; top: 24px; bottom: -24px; width: 2px; border-left: 2px dashed #C5A059; }
        
        .custom-div-icon {
            background: #C5A059;
            border: 3px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Transition Styles */
        #page-loader {
            position: fixed;
            inset: 0;
            background-color: #f8f6f6;
            z-index: 9999;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #page-loader.fade-out { opacity: 0; }
    </style>
    <meta name="description" content="สัมผัสมรดกทางวัฒนธรรมย่านธนบุรีและคลองบางกอกน้อย ย้อนรอยประวัติศาสตร์ผ่านเทคโนโลยีดิจิทัล">

    <meta name="keywords" content="ธนบุรี, คลองบางกอกน้อย, มรดกทางวัฒนธรรม, เที่ยวฝั่งธน, วัดสุวรรณาราม, บ้านบุ">

    <meta property="og:title" content="Thonburi Heritage - จิตวิญญาณแห่งธนบุรี">
    <meta property="og:description" content="โครงการอนุรักษ์มรดกดิจิทัลเพื่อชุมชนริมคลองบางกอกน้อย">
    <meta property="og:image" content="URL_รูปภาพหน้าปกเว็บของคุณ">
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">

<div id="page-loader">
    <div class="flex flex-col items-center gap-4">
        <span class="material-symbols-outlined text-primary text-6xl animate-bounce">map</span>
        <p class="text-secondary font-bold tracking-widest uppercase text-xs">กำลังโหลดแผนที่...</p>
    </div>
</div>

<div class="flex h-screen flex-col">
    <header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 py-3 z-20">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-3">
                <div class="size-10 bg-primary rounded-xl flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">map</span>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-wood dark:text-gold">Heritage Explorer</h2>
            </div>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-sm font-semibold text-primary border-b-2 border-primary pb-1" href="index.html">หน้าแรก</a>
            </nav>
        </div>
        <div class="h-8 w-8 rounded-full bg-wood flex items-center justify-center text-white text-xs font-bold ring-2 ring-primary/20 cursor-pointer overflow-hidden">
            <img alt="User" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVfq1o5_Ff3LMHD5oD8pdQtNfQfuXz1e1QF0ezX9ffhpDMa5RcMD3QbEXmGxfOnHgNS0Zu9vl6rqiUPZH1CqXejFI1sWYgR3VteIS3DMJuQpjekY0FPEKTtX1R17eDf6whL09F2YJeJiko6SEUqgS_sh2K99HeAYOaMgI-7_0S88ZAmLfsChDDjCeROLwxvdrD7PtORyqBvY2jM2mKWAxrpsDSljYwHgqliJVZnp6hkwmb2aqLpKmsV6PEdGbPynf7I-Vg22STTII"/>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-full md:w-[40%] flex flex-col border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark z-10 shadow-xl">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800">
                <span class="inline-block px-3 py-1 bg-primary/10 text-primary text-xs font-bold rounded-full mb-2">WALKING TOUR</span>
                <h1 class="text-2xl font-bold text-wood">เลาะคลอง ส่องวัดเก่า</h1>
                <p class="text-slate-500 text-sm mt-1">เริ่มต้นที่: ท่าเรือวังหลัง (ศิริราช)</p>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8" id="stops-container"></div>
        </aside>

        <section class="hidden md:block flex-1 relative bg-slate-200 overflow-hidden">
            <div id="map-canvas"></div>
        </section>
    </main>
</div>

<div id="place-detail" class="fixed inset-0 z-[60] hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDetail()"></div>
    <div id="detail-panel" class="absolute right-0 top-0 h-full w-full max-w-lg bg-white shadow-2xl transform transition-transform duration-300 translate-x-full">
        <button onclick="closeDetail()" class="absolute top-4 left-4 z-10 size-10 bg-white rounded-full flex items-center justify-center shadow-md hover:bg-slate-50 transition-colors">
            <span class="material-symbols-outlined text-secondary">close</span>
        </button>
        <div id="detail-content" class="h-full overflow-y-auto custom-scrollbar"></div>
    </div>
</div>

<script>
    const placesData = [
        {
            id: 'wat-rakhang',
            title: "วัดระฆังโฆสิตาราม",
            category: "วัดสำคัญทางประวัติศาสตร์",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuC1bUKUTZQUbkgGD2ko8-YowRA7jHdCWfEBfyB_zMwhNofM0n3kbzVMklMJKnV0JbaX-KsuYbMrDiGKh30IxRGheP0_8ArEUAd_1jzfQf2Oa7MgdgCg4mulF4KIwGfR6WPw3Crgc-Lx4BLkh53izWD-b04czknBtMZC87hAgUyM1Iz9apyAZb7HbJqk07_FXbn5hYaBDrM7A-6djjADzitHKXZEgr_CZQ9vzR9FjvRBDgQNw283-RQNMksj0MeqxnF1jBZWdl_rhg8",
            time: "08:00 - 17:00 น.",
            price: "เข้าชมฟรี",
            desc: "วัดระฆังโฆสิตารามวรมหาวิหาร เป็นวัดโบราณสร้างมาตั้งแต่สมัยอยุธยา เดิมชื่อวัดบางหว้าใหญ่ รัชกาลที่ 1 ได้ทรงบูรณปฏิสังขรณ์และทรงขุดพบระฆังโบราณ จึงเป็นที่มาของชื่อวัดในปัจจุบัน",
            lat: 13.7531, lng: 100.4855
        },
        {
            id: 'trok-ma-mear',
            title: "ชุมชนตรอกมะเมีย",
            category: "ชุมชนเก่าแก่",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuDsEHarI1qFlFgMlrWT7V0vviDTGc1CZ3SkCpKALZNvH93gaai6Tj3o8M8g_0Vym_ADTkbx7s4E7t8kqGRT3DoLUe5N5YRAQsx_soQjmyB79LnAx1J6VAJSRFndqZPRKMNnHab7N9SzUaUiWyE9sbkTwEpFbsY6ygfGcA0ekS9vAhnNVPSNw2gYmNRjpr59DNEkk_OUGhdpKu3GqUobNzpcK6PVde52bScjSpXT8FqGtzCz5joMpcr7z6GSyPMBem32VtBpaY7K4Ng",
            time: "เปิดตลอดเวลา",
            price: "เข้าชมฟรี",
            desc: "ย่านชุมชนไม้โบราณริมน้ำ สัมผัสวิถีชีวิตดั้งเดิมและงานหัตถกรรมที่หาชมยาก",
            lat: 13.7565, lng: 100.4845
        },
        {
            id: 'thonburi-station',
            title: "สถานีรถไฟธนบุรี",
            category: "สถานที่ประวัติศาสตร์",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuA-BUpmgeOJesl9Y2nz5lTqyMKW8R0Sf44gdSajUnwU4g2lDz1PwciT8gU0EmI4cGe5RH2Y0I60RDSm0PgQq6zZ1F2oQqJ44D3hBI2Qz3w--RPZX4bp2UTlf74A3U9IH6UGH3kKTT5lY0wtY7eOqfObWWN-EjxPGd8tHGYc2_J-7Vl0CoCOtO7W9jpISROF2KBtA8cuZcxgoBMREi_l8HWAW6fptNDFQlgQByhzWApsVATc4Y1a8hEnh0De13yCwhvgckn1oZtZ_bU",
            time: "04:00 - 22:00 น.",
            price: "เข้าชมฟรี",
            desc: "อดีตสถานีปลายทางของรถไฟสายมรณะ มีสถาปัตยกรรมที่สวยงามและเป็นจุดเชื่อมต่อการเดินทางสำคัญ",
            lat: 13.7595, lng: 100.4830
        }
    ];

    let map;

    function initMap() {
        map = L.map('map-canvas', { zoomControl: false }).setView([13.7550, 100.4845], 15);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const stopsContainer = document.getElementById('stops-container');
        const routePath = [];

        placesData.forEach((place, index) => {
            const pos = [place.lat, place.lng];
            routePath.push(pos);

            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: index + 1,
                iconSize: [30, 30]
            });

            const marker = L.marker(pos, { icon: customIcon }).addTo(map);
            marker.on('click', () => showDetail(place.id));

            const stopHtml = `
                <div onclick="focusPlace('${place.id}')" class="relative flex gap-6 cursor-pointer group">
                    ${index < placesData.length - 1 ? '<div class="route-line"></div>' : ''}
                    <div class="z-10 size-10 bg-primary border-4 border-white rounded-full flex items-center justify-center text-white font-bold shadow-md group-hover:scale-110 transition-transform">
                        ${index + 1}
                    </div>
                    <div class="flex-1 bg-white border border-slate-100 p-4 rounded-2xl hover:shadow-lg transition-all border-l-4 border-l-primary shadow-sm">
                        <h3 class="font-bold text-wood group-hover:text-primary transition-colors">${place.title}</h3>
                        <p class="text-xs text-slate-500 mt-1 line-clamp-1">${place.category}</p>
                    </div>
                </div>
            `;
            stopsContainer.insertAdjacentHTML('beforeend', stopHtml);
        });

        L.polyline(routePath, { color: '#C5A059', weight: 4, dashArray: '10, 10', opacity: 0.8 }).addTo(map);

        // เมื่อแผนที่พร้อม ให้เอา Loader ออก
        setTimeout(() => {
            document.getElementById('page-loader').classList.add('fade-out');
        }, 300);
    }

    function focusPlace(id) {
        const place = placesData.find(p => p.id === id);
        map.flyTo([place.lat, place.lng], 17);
        showDetail(id);
    }

    function showDetail(id) {
        const data = placesData.find(p => p.id === id);
        if (!data) return;

        const content = document.getElementById('detail-content');
        content.innerHTML = `
            <img src="${data.image}" class="w-full h-64 object-cover">
            <div class="p-8">
                <span class="text-xs font-bold text-primary tracking-widest uppercase">${data.category}</span>
                <h2 class="text-3xl font-black text-wood mt-1 mb-4">${data.title}</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">เวลาเปิด</p>
                        <p class="text-sm font-bold text-wood">${data.time}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">ค่าเข้า</p>
                        <p class="text-sm font-bold text-wood">${data.price}</p>
                    </div>
                </div>
                <p class="text-slate-600 leading-relaxed mb-8">${data.desc}</p>
                <button onclick="window.open('https://www.google.com/maps?q=${data.lat},${data.lng}')" 
                        class="w-full bg-primary text-secondary font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-primary/90 transition-all shadow-lg">
                    <span class="material-symbols-outlined">directions</span> นำทางด้วย Google Maps
                </button>
            </div>
        `;

        document.getElementById('place-detail').classList.remove('hidden');
        setTimeout(() => document.getElementById('detail-panel').classList.remove('translate-x-full'), 10);
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.add('translate-x-full');
        setTimeout(() => document.getElementById('place-detail').classList.add('hidden'), 300);
    }

    // ระบบ Smooth Navigation สำหรับลิงก์ทั้งหมด
    document.addEventListener('click', (e) => {
        const link = e.target.closest('a');
        if (link && link.getAttribute('href') && !link.getAttribute('href').startsWith('http') && link.getAttribute('href') !== '#') {
            e.preventDefault();
            const destination = link.getAttribute('href');
            document.getElementById('page-loader').classList.remove('fade-out');
            setTimeout(() => { window.location.href = destination; }, 500);
        }
    });

    document.addEventListener('DOMContentLoaded', initMap);
</script>

</body>
</html>
