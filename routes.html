<!DOCTYPE html>
<html class="light" lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Thonburi Heritage - เส้นทางท่องเที่ยว (Heritage Explorer)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C5A059",
                        "gold": "#d4af37",
                        "wood": "#5d4037",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Noto Sans Thai", "Public Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', 'Public Sans', sans-serif; }
        #map-canvas { height: 100%; width: 100%; z-index: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
        .route-line { position: absolute; left: 19px; top: 24px; bottom: -24px; width: 2px; border-left: 2px dashed #C5A059; }
        
        .custom-div-icon {
            background: #C5A059;
            border: 3px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #page-loader {
            position: fixed; inset: 0; background-color: #f8f6f6; z-index: 9999;
            pointer-events: none; opacity: 1; transition: opacity 0.5s ease-in-out;
            display: flex; align-items: center; justify-content: center;
        }
        #page-loader.fade-out { opacity: 0; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden font-display">

<div id="page-loader">
    <div class="flex flex-col items-center gap-4">
        <span class="material-symbols-outlined text-primary text-6xl animate-bounce">map</span>
        <p class="text-secondary font-bold tracking-widest uppercase text-xs">กำลังโหลดแผนที่เส้นทาง...</p>
    </div>
</div>

<div class="flex h-screen flex-col">
    <header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 py-3 z-20 shadow-sm font-display">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-3">
                <div class="size-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg">
                    <span class="material-symbols-outlined">map</span>
                </div>
                <h2 class="text-xl font-black tracking-tighter text-wood dark:text-gold uppercase">Heritage Explorer</h2>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-sm font-bold text-slate-500 hover:text-primary transition-all uppercase tracking-widest" href="index.html">หน้าแรก</a>
                <a class="text-sm font-bold text-slate-500 hover:text-primary transition-all uppercase tracking-widest" href="news.html">ข่าวสาร</a>
                <a class="text-sm font-bold text-slate-500 hover:text-primary transition-all uppercase tracking-widest" href="f.html">แหล่งมรดกทางวัฒนธรรม</a>
            </nav>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='admin-login.html'" class="hidden md:block bg-slate-100 dark:bg-slate-800 hover:bg-primary hover:text-white text-slate-600 dark:text-slate-300 px-5 py-1.5 rounded-full text-xs font-black transition-all">
                ระบบจัดการ
            </button>
            <div class="h-10 w-10 rounded-full bg-wood flex items-center justify-center text-white text-xs font-bold ring-2 ring-primary/20 cursor-pointer overflow-hidden shadow-md">
                <img alt="User" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVfq1o5_Ff3LMHD5oD8pdQtNfQfuXz1e1QF0ezX9ffhpDMa5RcMD3QbEXmGxfOnHgNS0Zu9vl6rqiUPZH1CqXejFI1sWYgR3VteIS3DMJuQpjekY0FPEKTtX1R17eDf6whL09F2YJeJiko6SEUqgS_sh2K99HeAYOaMgI-7_0S88ZAmLfsChDDjCeROLwxvdrD7PtORyqBvY2jM2mKWAxrpsDSljYwHgqliJVZnp6hkwmb2aqLpKmsV6PEdGbPynf7I-Vg22STTII"/>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-full md:w-[40%] flex flex-col border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark z-10 shadow-xl">
            <div class="p-8 border-b border-slate-100 dark:border-slate-800">
                <span class="inline-block px-3 py-1 bg-primary/10 text-primary text-xs font-black rounded-full mb-3 uppercase tracking-widest">Walking Tour</span>
                <h1 class="text-3xl font-black text-wood dark:text-gold">เลาะคลอง ส่องวัดเก่า</h1>
                <p class="text-slate-500 text-sm mt-2 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">location_on</span> เริ่มต้นที่: ท่าเรือวังหลัง (ศิริราช)
                </p>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8" id="stops-container"></div>
        </aside>

        <section class="hidden md:block flex-1 relative bg-slate-200 overflow-hidden">
            <div id="map-canvas"></div>
        </section>
    </main>
</div>

<div id="place-detail" class="fixed inset-0 z-[60] hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity" onclick="closeDetail()"></div>
    <div id="detail-panel" class="absolute right-0 top-0 h-full w-full max-w-lg bg-white dark:bg-background-dark shadow-2xl transform transition-transform duration-500 translate-x-full">
        <button onclick="closeDetail()" class="absolute top-6 left-6 z-10 size-12 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-transform">
            <span class="material-symbols-outlined text-secondary dark:text-white">close</span>
        </button>
        <div id="detail-content" class="h-full overflow-y-auto custom-scrollbar"></div>
    </div>
</div>

<script>
    const placesData = [
        {
            id: 'wat-suwan',
            title: "วัดสุวรรณาราม",
            category: "วัดสำคัญทางประวัติศาสตร์",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuBhtM-hqxa7kOPaOQYIKz8cVhTNOEXW66oRP8d7SOghQALnY_-SIyS4nmBThe-jzMnYL8A54RmipTVZvKu6GD_8UyDqa2Tyy7XbZaUy3ehKmCkZso5DUBCdP5Gk8yqVDOAlQ6K9uFD-Hxd7eHYdryKg2_CWZumv3CoSVhAnR6SIpoI8tTY_fmmbpgue5Fnqx3Qj4HzZyseZ3Tm4hFE6sYYBfoLiJbSuQNlpXB2hMt9oHEn7a8RgZjSDqHUC25xaNPQE-CLz3F-s9nA",
            time: "08:00 - 17:00 น.",
            price: "เข้าชมฟรี",
            desc: "วัดโบราณสมัยอยุธยาเดิมชื่อ วัดทอง ต่อมาในสมัยรัชกาลที่ 1 ทรงบูรณปฏิสังขรณ์ใหม่ จุดเด่นคือภาพทศชาติชาดกในพระอุโบสถที่เป็นผลงานประชันฝีมือช่างสิบหมู่ยุคทอง",
            lat: 13.7611, lng: 100.4789
        },
        {
            id: 'wat-rakhang',
            title: "วัดระฆังโฆสิตาราม",
            category: "วัดสำคัญทางประวัติศาสตร์",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuC1bUKUTZQUbkgGD2ko8-YowRA7jHdCWfEBfyB_zMwhNofM0n3kbzVMklMJKnV0JbaX-KsuYbMrDiGKh30IxRGheP0_8ArEUAd_1jzfQf2Oa7MgdgCg4mulF4KIwGfR6WPw3Crgc-Lx4BLkh53izWD-b04czknBtMZC87hAgUyM1Iz9apyAZb7HbJqk07_FXbn5hYaBDrM7A-6djjADzitHKXZEgr_CZQ9vzR9FjvRBDgQNw283-RQNMksj0MeqxnF1jBZWdl_rhg8",
            time: "08:00 - 17:00 น.",
            price: "เข้าชมฟรี",
            desc: "วัดระฆังโฆสิตารามวรมหาวิหาร เป็นวัดโบราณสร้างมาตั้งแต่สมัยอยุธยา เดิมชื่อวัดบางหว้าใหญ่ รัชกาลที่ 1 ได้ทรงบูรณปฏิสังขรณ์และทรงขุดพบระฆังโบราณ จึงเป็นที่มาของชื่อวัดในปัจจุบัน",
            lat: 13.7531, lng: 100.4855
        },
        {
            id: 'baan-bu',
            title: "ชุมชนบ้านบุ",
            category: "ชุมชนเก่าแก่",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuDsEHarI1qFlFgMlrWT7V0vviDTGc1CZ3SkCpKALZNvH93gaai6Tj3o8M8g_0Vym_ADTkbx7s4E7t8kqGRT3DoLUe5N5YRAQsx_soQjmyB79LnAx1J6VAJSRFndqZPRKMNnHab7N9SzUaUiWyE9sbkTwEpFbsY6ygfGcA0ekS9vAhnNVPSNw2gYmNRjpr59DNEkk_OUGhdpKu3GqUobNzpcK6PVde52bScjSpXT8FqGtzCz5joMpcr7z6GSyPMBem32VtBpaY7K4Ng",
            time: "เปิดตลอดเวลา",
            price: "เข้าชมฟรี",
            desc: "ชุมชนช่างหัตถกรรมที่สืบทอดภูมิปัญญาการทำขันลงหินมานานกว่า 200 ปี เป็นแหล่งประวัติศาสตร์ที่มีชีวิตริมคลองบางกอกน้อย",
            lat: 13.7580, lng: 100.4795
        },
        {
            id: 'wat-arun',
            title: "วัดอรุณราชวราราม",
            category: "วัดสำคัญทางประวัติศาสตร์",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuDTBzZY7TMbpG_fDacNYnVKTm2sTWqvH2U2QT8PyeW_C5WobACZi7rfIG5AnusTcrc3GNWWCrViecdwhSSrbc0j6X7nJsAVayLiL5jQknWyvayKAj_UgXbDrtGCNOOPMs9km1qZt_942ulyxZIzdPBcRGb6HaTjOuuxY6j_cVGMGAVZ5ESz8T3tOx0Yhjl_S5gUeaeeImZAgSzYzu-kDATZLwQd-tClOycx6QWsc-N913Cn_fiMNFn5l4kBek-jt30UfQGLNeTwl3M",
            time: "08:00 - 18:00 น.",
            price: "คนไทยฟรี",
            desc: "พระปรางค์ริมน้ำเจ้าพระยาสัญลักษณ์แห่งความรุ่งโรจน์ของกรุงธนบุรี ประดับด้วยกระเบื้องเคลือบสีโบราณและรูปปั้นยักษ์วัดแจ้ง",
            lat: 13.7437, lng: 100.4889
        },
        {
            id: 'thonburi-station',
            title: "สถานีรถไฟธนบุรี",
            category: "สถานที่ประวัติศาสตร์",
            image: "https://lh3.googleusercontent.com/aida-public/AB6AXuA-BUpmgeOJesl9Y2nz5lTqyMKW8R0Sf44gdSajUnwU4g2lDz1PwciT8gU0EmI4cGe5RH2Y0I60RDSm0PgQq6zZ1F2oQqJ44D3hBI2Qz3w--RPZX4bp2UTlf74A3U9IH6UGH3kKTT5lY0wtY7eOqfObWWN-EjxPGd8tHGYc2_J-7Vl0CoCOtO7W9jpISROF2KBtA8cuZcxgoBMREi_l8HWAW6fptNDFQlgQByhzWApsVATc4Y1a8hEnh0De13yCwhvgckn1oZtZ_bU",
            time: "04:00 - 22:00 น.",
            price: "เข้าชมฟรี",
            desc: "อดีตสถานีปลายทางของรถไฟสายมรณะ มีสถาปัตยกรรมที่สวยงามและเป็นจุดเชื่อมต่อการเดินทางสำคัญในย่านบางกอกน้อย",
            lat: 13.7595, lng: 100.4830
        }
    ];

    let map;

    function initMap() {
        map = L.map('map-canvas', { zoomControl: false }).setView([13.7550, 100.4845], 15);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const stopsContainer = document.getElementById('stops-container');
        const routePath = [];

        placesData.forEach((place, index) => {
            const pos = [place.lat, place.lng];
            routePath.push(pos);

            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: index + 1,
                iconSize: [30, 30]
            });

            const marker = L.marker(pos, { icon: customIcon }).addTo(map);
            marker.on('click', () => showDetail(place.id));

            const stopHtml = `
                <div onclick="focusPlace('${place.id}')" class="relative flex gap-6 cursor-pointer group">
                    ${index < placesData.length - 1 ? '<div class="route-line"></div>' : ''}
                    <div class="z-10 size-10 bg-primary border-4 border-white dark:border-slate-800 rounded-full flex items-center justify-center text-white font-black shadow-md group-hover:scale-110 transition-transform">
                        ${index + 1}
                    </div>
                    <div class="flex-1 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-5 rounded-2xl hover:shadow-2xl transition-all border-l-4 border-l-primary shadow-sm text-left">
                        <h3 class="font-bold text-wood dark:text-white group-hover:text-primary transition-colors text-lg">${place.title}</h3>
                        <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">${place.category}</p>
                    </div>
                </div>
            `;
            stopsContainer.insertAdjacentHTML('beforeend', stopHtml);
        });

        L.polyline(routePath, { color: '#C5A059', weight: 4, dashArray: '10, 10', opacity: 0.8 }).addTo(map);

        setTimeout(() => {
            document.getElementById('page-loader').classList.add('fade-out');
        }, 500);
    }

    function focusPlace(id) {
        const place = placesData.find(p => p.id === id);
        if(place) {
            map.flyTo([place.lat, place.lng], 17, { animate: true, duration: 1.5 });
            showDetail(id);
        }
    }

    function showDetail(id) {
        const data = placesData.find(p => p.id === id);
        if (!data) return;

        const content = document.getElementById('detail-content');
        content.innerHTML = `
            <div class="relative h-80 overflow-hidden">
                <img src="${data.image}" class="w-full h-full object-cover shadow-inner">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            </div>
            <div class="p-10 text-left">
                <span class="inline-block px-3 py-1 bg-primary text-white text-[10px] font-black rounded-full uppercase tracking-widest mb-4">${data.category}</span>
                <h2 class="text-4xl font-black text-wood dark:text-gold mb-6 leading-tight">${data.title}</h2>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl border border-slate-100 dark:border-slate-700">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">เวลาเข้าชม</p>
                        <p class="text-sm font-bold text-wood dark:text-white">${data.time}</p>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl border border-slate-100 dark:border-slate-700">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">ค่าธรรมเนียม</p>
                        <p class="text-sm font-bold text-wood dark:text-white">${data.price}</p>
                    </div>
                </div>
                <div class="space-y-4 mb-10">
                    <h4 class="font-black text-secondary dark:text-gold text-lg border-b pb-2">คำอธิบาย</h4>
                    <p class="text-slate-600 dark:text-slate-300 leading-relaxed text-lg text-justify">${data.desc}</p>
                </div>
                <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${data.lat},${data.lng}', '_blank')" 
                        class="w-full bg-primary text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 hover:bg-wood transition-all shadow-xl active:scale-95">
                    <span class="material-symbols-outlined">directions</span> นำทางด้วย Google Maps
                </button>
            </div>
        `;

        document.getElementById('place-detail').classList.remove('hidden');
        setTimeout(() => document.getElementById('detail-panel').classList.remove('translate-x-full'), 10);
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.add('translate-x-full');
        setTimeout(() => document.getElementById('place-detail').classList.add('hidden'), 500);
    }

    function checkUrlParameters() {
        const urlParams = new URLSearchParams(window.location.search);
        const placeId = urlParams.get('id');
        if (placeId) {
            setTimeout(() => {
                focusPlace(placeId);
            }, 1200); 
        }
    }

    document.addEventListener('click', (e) => {
        const link = e.target.closest('a');
        if (link && link.getAttribute('href') && !link.getAttribute('href').startsWith('http') && link.getAttribute('href') !== '#') {
            e.preventDefault();
            const destination = link.getAttribute('href');
            document.getElementById('page-loader').classList.remove('fade-out');
            setTimeout(() => { window.location.href = destination; }, 500);
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        initMap();
        checkUrlParameters();
    });
</script>

</body>
</html>
